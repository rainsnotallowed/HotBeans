    <div class="content">
        <form class="post">
            <div class="form-group">
                <h2>Sign Up</h2>
                <label for="text">Full Name:</label>
                <input type="text" name="text" id="text" placeholder="Enter text" class="input-box">

                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="Enter email" class="input-box">
                <label for="message">Message:</label>
                <label for="role">role:</label>
                <input type="text" name="message" id="message" placeholder="Enter message" class="input-box">
                <select name="role" id="role" class="input-box">
                    <option value="developer">Developer</option>
                    <option value="designer">Designer</option>
                    <option value="manager">Manager</option>
                    <option value="other">Other</option>
                </select>
                <button type="button" onclick="validate()">Submit</button>
            </div>
        </form>
